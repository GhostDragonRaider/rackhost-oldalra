# Booking Appointment (Project 2) – backend proxy
# Másold ezt a blokkot a Nginx default config-ba, a location /projects/ ELÉ
# (a specifikusabb útvonalnak előbb kell szerepelnie).
# Cseréld a 3001-et a booking backend tényleges portjára.

location /projects/project-2/ {
    proxy_pass http://127.0.0.1:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
